    facts: { capital: "Started small", time: "Alongside M&S job", model: "Wholesale + brands", result: "£10K month 1 · ~£20K/mo" },
    quote: "I made £10,000 in my first month on Amazon.",
    match: "For the prospect who's done eBay or Shopify and never saw real profit come through.",
    video: "https://youtu.be/z317vuImRbo"
  }
];

const FILTERS = [
  { key: "all", label: "All stories" },
  { key: "job", label: "Working a 9-5" },
  { key: "parent", label: "Parent" },
  { key: "young", label: "Under 25" },
  { key: "moved", label: "Moved to the UK" },
  { key: "beginner", label: "Total beginner" },
  { key: "tried", label: "Failed before" },
  { key: "ecom", label: "Did eBay / Shopify" },
  { key: "milestone", label: "Hit £100K+" },
  { key: "fulltime", label: "Went full-time" }
];

</script>
<script>
  const grid=document.getElementById('grid');
  const filterRow=document.getElementById('filterRow');
  const overlay=document.getElementById('overlay');
  const modal=document.getElementById('modal');
  const empty=document.getElementById('empty');
  const gridCount=document.getElementById('gridCount');
  let active="all";
  const tagLabels={job:"9-5 job",parent:"Parent",young:"Under 25",moved:"Moved to UK",beginner:"Beginner",tried:"Failed before",ecom:"Ex eBay/Shopify",milestone:"\u00A3100K+",fulltime:"Went full-time"};

  function counts(){const c={all:STUDENTS.length};STUDENTS.forEach(s=>s.tags.forEach(t=>c[t]=(c[t]||0)+1));return c;}

  function renderFilters(){
    const c=counts();
    filterRow.innerHTML=FILTERS.map(f=>{
      const n=f.key==="all"?c.all:(c[f.key]||0);
      return `<button class="chip ${f.key===active?'active':''}" data-k="${f.key}">${f.label}<span class="ct">${n}</span></button>`;
    }).join('');
    filterRow.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{active=b.dataset.k;renderFilters();renderGrid();});
  }

  function renderGrid(){
    const list=active==="all"?STUDENTS:STUDENTS.filter(s=>s.tags.includes(active));
    gridCount.textContent="("+list.length+")";
    empty.style.display=list.length?"none":"block";
    grid.innerHTML=list.map(s=>`
      <div class="card" data-id="${s.id}">
        <div class="card-top">
          <div class="avatar">${s.initials}</div>
          <div class="ci"><div class="card-name">${s.name}<span class="card-flag">${s.country}</span></div><div class="card-id">${s.identity}</div>${s.startedWith ? `<div class="started">💰 Started with ${s.startedWith}</div>` : ''}</div>
          <div class="arrow">&rarr;</div>
        </div>
        <div class="speed">&#9656; ${s.speed}</div>
        <div class="result-band">
          <div class="big">${s.headline.replace(/(\u00A3[\d.,\u2013-]*\d|\u00A30|\u00A3[\d.,]+K)/g,'<span class="g">$1</span>')}</div>
          <div class="small">${s.sub}</div>
        </div>
        <div class="tagrow">${s.tags.map(t=>`<span class="tag">${tagLabels[t]||t}</span>`).join('')}</div>
      </div>`).join('');
    grid.querySelectorAll('.card').forEach(c=>c.onclick=()=>openModal(c.dataset.id));
  }

  function openModal(id){
    const s=STUDENTS.find(x=>x.id===id);
    modal.innerHTML=`
      <div class="m-hero">
        <button class="m-close" id="mClose">&times;</button>
        <div class="m-top">
          <div class="m-avatar">${s.initials}</div>
          <div><div class="m-name">${s.name}<span class="m-flag">${s.country}</span></div><div class="m-id">${s.identity}</div>${s.startedWith ? `<div class="m-started">💰 Started with ${s.startedWith}</div>` : ''}</div>
        </div>
        <div class="m-result"><span class="big">${s.headline}</span><span class="sub">${s.sub}</span></div>
        <div class="m-speed">&#9656; ${s.speed}</div>
      </div>
      <div class="m-body">
        <div class="block"><div class="lbl">Where ${s.name.split(' ')[0]} started</div><p>${s.before}</p></div>
        <div class="block fear"><div class="lbl">The fear holding them back</div><p>${s.fear}</p></div>
        <div class="block changed"><div class="lbl">What changed</div><p>${s.changed}</p></div>
        <div class="facts">
          <div class="fact"><div class="fl">Starting capital</div><div class="fv">${s.facts.capital}</div></div>
          <div class="fact"><div class="fl">Time commitment</div><div class="fv">${s.facts.time}</div></div>
          <div class="fact"><div class="fl">Model</div><div class="fv">${s.facts.model}</div></div>
          <div class="fact win"><div class="fl">Result</div><div class="fv">${s.facts.result}</div></div>
        </div>
        <div class="quote"><span class="mark">&ldquo;</span><p>${s.quote}</p></div>
        <a class="watch" href="${s.video}" target="_blank" rel="noopener"><span class="play">&#9654;</span> Watch ${s.name.split(' ')[0]}'s full story</a>
      </div>`;
    overlay.classList.add('show');
    document.body.style.overflow='hidden';
    document.getElementById('mClose').onclick=closeModal;
  }
  function closeModal(){overlay.classList.remove('show');document.body.style.overflow='';}
  overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

  renderFilters();renderGrid();
</script>
</body>
</html>
